service: famtree-api

frameworkVersion: '3'
useDotenv: true
package:
  individually: true
  include:
    - dist/swagger.json  # 👈 이 줄을 정확히 추가해 주세요!
    - src/swagger.json   # (혹시 모르니 src 폴더용도 같이 넣어두면 안전합니다)
    - public/**          # 정적 자산 (logo.png, 스토어 배지, .well-known/*) — express.static 으로 서빙
provider:
  name: aws
  runtime: nodejs20.x
  stage: ${opt:stage, 'dev'}
  region: ap-northeast-2
  memorySize: 512
  timeout: 30

  environment:
    NODE_ENV: ${self:custom.nodeEnv.${self:provider.stage}, 'development'}
    DATABASE_URL: ${env:DATABASE_URL, ''}
    JWT_SECRET: ${env:JWT_SECRET}
    JWT_REFRESH_SECRET: ${env:JWT_REFRESH_SECRET}
    COGNITO_USER_POOL_ID: ${env:COGNITO_USER_POOL_ID, ''}
    COGNITO_CLIENT_ID: ${env:COGNITO_CLIENT_ID, ''}
    COGNITO_REGION: ${self:provider.region}
    FIREBASE_PROJECT_ID: ${env:FIREBASE_PROJECT_ID, ''}
    FIREBASE_CLIENT_EMAIL: ${env:FIREBASE_CLIENT_EMAIL, ''}
    FIREBASE_PRIVATE_KEY: ${env:FIREBASE_PRIVATE_KEY, ''}
    # APNs (iOS 푸시)
    APNS_KEY_ID: ${env:APNS_KEY_ID, ''}
    APNS_TEAM_ID: ${env:APNS_TEAM_ID, ''}
    APNS_BUNDLE_ID: ${env:APNS_BUNDLE_ID, ''}
    APNS_PRIVATE_KEY: ${env:APNS_PRIVATE_KEY, ''}
    # Apple Sign-In audience 검증 (iOS 앱 ID + Android Services ID 콤마 구분)
    APPLE_BUNDLE_ID: ${env:APPLE_BUNDLE_ID, ''}
    # 이메일 인증코드 발송용 SMTP (POST /auth/email/request-code)
    # 미설정 시 dev fallback(JSON transport) — 실제 발송 안 되고 CloudWatch 로그에 code 만 남음.
    SMTP_HOST: ${env:SMTP_HOST, ''}
    SMTP_PORT: ${env:SMTP_PORT, ''}
    SMTP_SECURE: ${env:SMTP_SECURE, ''}
    SMTP_USER: ${env:SMTP_USER, ''}
    SMTP_PASS: ${env:SMTP_PASS, ''}
    SMTP_FROM: ${env:SMTP_FROM, ''}

  # IAM 권한 (최소 권한 원칙)
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - cognito-idp:AdminGetUser
            - cognito-idp:AdminDeleteUser
            - cognito-idp:ListUsers
          Resource:
            - arn:aws:cognito-idp:${self:provider.region}:*:userpool/*
        - Effect: Allow
          Action:
            - ec2:CreateNetworkInterface
            - ec2:DescribeNetworkInterfaces
            - ec2:DeleteNetworkInterface
          Resource: '*'

  # VPC 설정 (RDS 접근을 위해 RDS와 동일 VPC 배치)
#  vpc:
#    securityGroupIds:
#      - sg-0b7e5bb2b2e60c200
#    subnetIds:
#      - subnet-0118b6d526e51fea1
#      - subnet-004ea2f0bd586e7c9
#      - subnet-0fb66c2fd273d0320
#      - subnet-0e28e7103a7f0f426

  # API Gateway CORS 설정 — Express(app.ts)에서 화이트리스트 처리하므로 여기는 OPTIONS만 통과시킴
  httpApi:
    cors:
      allowedOrigins:
        - https://mongle.app
        - https://monggle.app
      allowedHeaders:
        - Content-Type
        - Authorization
        - Accept-Language
      allowedMethods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      allowCredentials: true

plugins:
  - serverless-plugin-typescript
  - serverless-offline

custom:
  serverless-offline:
    httpPort: 3000
    lambdaPort: 3002
  nodeEnv:
    prod: production
    dev: development
  # MG-30: cron(EventBridge) 스케줄은 prod stage에서만 활성화.
  # 사유: .env 파일이 stage 공용(prod RDS)이라 dev Lambda가 cron으로 돌면
  # dev + prod 두 Lambda가 같은 prod DB로 리마인더/배정을 각각 실행 → 2회 중복.
  # dev 수동 검증은 `npx serverless invoke --stage dev --function <name>` 사용.
  schedulerEnabled:
    prod: true
    dev: false

functions:
  # Main API Handler
  api:
    handler: src/lambda.handler
    events:
      - httpApi:
          method: '*'
          path: '/{proxy+}'
      - httpApi:
          method: '*'
          path: '/'

  # Swagger UI (prod에서는 app.ts의 NODE_ENV=production 체크로 라우트 미등록됨)
  swagger:
    handler: src/swagger.handler
    events:
      - httpApi:
          method: GET
          path: /docs
      - httpApi:
          method: GET
          path: /docs/{proxy+}

  # 매일 오전 질문 배정 스케줄러 (KST 11:00 = UTC 02:00)
  # enabled: MG-30 — prod에서만 활성화 (dev는 .env가 prod DB라 중복 실행 방지)
  dailyQuestionScheduler:
    handler: src/scheduler.handler
    timeout: 60
    events:
      - schedule:
          rate: cron(0 2 * * ? *)
          enabled: ${self:custom.schedulerEnabled.${self:provider.stage}, false}

  # 매일 저녁 자동 재촉 알림 (KST 19:00 = UTC 10:00)
  # 각 가족의 현재 활성 질문에 대해 아직 답/패스 안 한 멤버에게 1회 푸시 (날짜 무관)
  # enabled: MG-30 — prod에서만 활성화
  dailyReminderScheduler:
    handler: src/reminderScheduler.handler
    timeout: 60
    events:
      - schedule:
          rate: cron(0 10 * * ? *)
          enabled: ${self:custom.schedulerEnabled.${self:provider.stage}, false}

  # 매일 새벽 만료/소비 row 정리 cron (KST 04:00 = UTC 19:00)
  # EmailVerification / UserAccessLog / UserRefreshToken / Notification 일괄 정리.
  # MG-52 — 무한 누적 차단 + LOGIN_LOCK piggyback 정리.
  # enabled: MG-30 — prod 에서만 활성화 (dev 는 .env 가 prod DB 라 중복 실행 방지).
  cleanupScheduler:
    handler: src/cleanupScheduler.handler
    timeout: 60
    events:
      - schedule:
          rate: cron(0 19 * * ? *)
          enabled: ${self:custom.schedulerEnabled.${self:provider.stage}, false}

# 리소스 정의 (선택사항 - 별도 CloudFormation으로 관리 권장)
# resources:
#   Resources:
#     CognitoUserPool:
#       Type: AWS::Cognito::UserPool
#       Properties:
#         UserPoolName: famtree-${self:provider.stage}-user-pool
