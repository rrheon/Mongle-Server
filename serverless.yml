service: famtree-api

frameworkVersion: '3'
useDotenv: true
package:
  individually: true
  include:
    - dist/swagger.json  # 👈 이 줄을 정확히 추가해 주세요!
    - src/swagger.json   # (혹시 모르니 src 폴더용도 같이 넣어두면 안전합니다)
provider:
  name: aws
  runtime: nodejs20.x
  stage: ${opt:stage, 'dev'}
  region: ap-northeast-2
  memorySize: 512
  timeout: 30

  environment:
    NODE_ENV: ${self:custom.nodeEnv.${self:provider.stage}, 'development'}
    DATABASE_URL: ${env:DATABASE_URL, ''}
    JWT_SECRET: ${env:JWT_SECRET}
    JWT_REFRESH_SECRET: ${env:JWT_REFRESH_SECRET}
    COGNITO_USER_POOL_ID: ${env:COGNITO_USER_POOL_ID, ''}
    COGNITO_CLIENT_ID: ${env:COGNITO_CLIENT_ID, ''}
    COGNITO_REGION: ${self:provider.region}
    FIREBASE_PROJECT_ID: ${env:FIREBASE_PROJECT_ID, ''}
    FIREBASE_CLIENT_EMAIL: ${env:FIREBASE_CLIENT_EMAIL, ''}
    FIREBASE_PRIVATE_KEY: ${env:FIREBASE_PRIVATE_KEY, ''}

  # IAM 권한 (최소 권한 원칙)
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - cognito-idp:AdminGetUser
            - cognito-idp:AdminDeleteUser
            - cognito-idp:ListUsers
          Resource:
            - arn:aws:cognito-idp:${self:provider.region}:*:userpool/*
        - Effect: Allow
          Action:
            - ec2:CreateNetworkInterface
            - ec2:DescribeNetworkInterfaces
            - ec2:DeleteNetworkInterface
          Resource: '*'

  # VPC 설정 (RDS 접근을 위해 RDS와 동일 VPC 배치)
#  vpc:
#    securityGroupIds:
#      - sg-0b7e5bb2b2e60c200
#    subnetIds:
#      - subnet-0118b6d526e51fea1
#      - subnet-004ea2f0bd586e7c9
#      - subnet-0fb66c2fd273d0320
#      - subnet-0e28e7103a7f0f426

  # API Gateway CORS 설정 — Express(app.ts)에서 화이트리스트 처리하므로 여기는 OPTIONS만 통과시킴
  httpApi:
    cors:
      allowedOrigins:
        - https://mongle.app
        - https://monggle.app
      allowedHeaders:
        - Content-Type
        - Authorization
        - Accept-Language
      allowedMethods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      allowCredentials: true

plugins:
  - serverless-plugin-typescript
  - serverless-offline

custom:
  serverless-offline:
    httpPort: 3000
    lambdaPort: 3002
  nodeEnv:
    prod: production
    dev: development

functions:
  # Main API Handler
  api:
    handler: src/lambda.handler
    events:
      - httpApi:
          method: '*'
          path: '/{proxy+}'
      - httpApi:
          method: '*'
          path: '/'

  # Swagger UI (prod에서는 app.ts의 NODE_ENV=production 체크로 라우트 미등록됨)
  swagger:
    handler: src/swagger.handler
    events:
      - httpApi:
          method: GET
          path: /docs
      - httpApi:
          method: GET
          path: /docs/{proxy+}

  # 매일 자정 질문 배정 스케줄러 (KST 00:00 = UTC 15:00)
  dailyQuestionScheduler:
    handler: src/scheduler.handler
    timeout: 60
    events:
      - schedule:
          rate: cron(0 15 * * ? *)
          enabled: true

# 리소스 정의 (선택사항 - 별도 CloudFormation으로 관리 권장)
# resources:
#   Resources:
#     CognitoUserPool:
#       Type: AWS::Cognito::UserPool
#       Properties:
#         UserPoolName: famtree-${self:provider.stage}-user-pool
